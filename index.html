<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Vwheel PRO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
      }
    }
    </script>
    <link rel="stylesheet" href="style.css?v=2.0">
</head>
<body>
    <div id="loading-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle at top left, #1e1b4b, #0b0e14); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div style="color:#fff; font-weight:800; font-size:2.5rem; letter-spacing:-1px; text-align:center; line-height:1; font-family:'Outfit';">Vwheel<br /><span style="color:#3b82f6; font-size:1rem; letter-spacing:4px; display:block; margin-top:5px;">PRO</span></div>
        <div style="width:40px; height:40px; border:4px solid rgba(255,255,255,0.1); border-top:4px solid #3b82f6; border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p style="color:rgba(255,255,255,0.5); margin-top:20px; font-weight:600; font-size:0.9rem; font-family:'Outfit';">RESTAURO DE SEGURANÇA...</p>
    </div>
    <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
    <!-- O app.js tratará do resto -->
    <script type="module" src="app.js?v=2.1"></script>
</body>
</html>
