<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vempire - Pro</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <div id="login-screen">
        <div class="login-content">
            <h1>Vempire</h1>
            <input type="text" id="l-email" placeholder="Nome ou Email">
            <input type="password" id="l-password" placeholder="Senha">
            <button id="btn-login">Entrar</button>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header>
            <h2>Perfil</h2>
            <button onclick="doLogout()">Sair</button>
        </header>

        <div id="view-profile">
            <div class="card">
                <h3>Frota</h3>
                <input type="text" id="cfg-nome" placeholder="Nome">
                <input type="text" id="cfg-matricula" placeholder="Matrícula">
                <select id="cfg-tabela">
                    <option value="nacional">Nacional</option>
                    <option value="iberico">Ibérico</option>
                    <option value="internacional">Internacional</option>
                </select>
                <input type="number" id="cfg-base" placeholder="Salário Base (€)">
                <input type="number" id="cfg-diuturnidades" placeholder="Diuturnidades (Qt.)">
            </div>

            <div class="card">
                <h3>Opções</h3>
                <div class="opcoes-grid">
                    <label><input type="checkbox" id="cfg-noturnoEnabled"> Noturno</label>
                    <label><input type="checkbox" id="cfg-adrEnabled"> ADR</label>
                    <label><input type="checkbox" id="cfg-cisternaEnabled"> Cisterna</label>
                    <label><input type="checkbox" id="cfg-duoEnabled"> Duodécimos</label>
                </div>
            </div>

            <div class="card">
                <h3>Resumo Estimado</h3>
                <p>Bruto: <span id="lbl-bruto-total">0,00</span></p>
                <p>SS: <span id="lbl-ss">0,00</span></p>
                <p>IRS: <span id="lbl-irs">0,00</span></p>
                <p>Líquido: <span id="lbl-fixo-liq">0,00</span></p>
            </div>
        </div>
    </div>

    <script src="app.js?v=3"></script>
</body>
</html>
